<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unterrichts-Aufgaben</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #d8d6ce;
    --border-strong: #b8b5aa;
    --text: #1a1916;
    --text-2: #5c5a52;
    --text-3: #9c9a90;
    --accent: #2a4a8a;
    --accent-bg: #e8eef8;
    --accent-text: #1a3060;
    --green: #1a5c2a;
    --green-bg: #e8f4ea;
    --amber: #7a4a00;
    --amber-bg: #fdf3e0;
    --red: #7a1a1a;
    --red-bg: #fae8e8;
    --radius: 6px;
    --radius-lg: 10px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: var(--text);
    color: #f5f4f0;
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 3px solid var(--accent);
  }
  header .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #9c9a90;
    margin-bottom: 0.4rem;
  }
  header h1 {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: #f5f4f0;
    margin-bottom: 0.75rem;
  }
  header h1 span { font-weight: 500; }
  .header-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .stat {
    font-family: var(--mono);
    font-size: 12px;
    color: #9c9a90;
  }
  .stat b { color: #f5f4f0; font-weight: 500; }

  /* MAIN LAYOUT */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .toolbar-left {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .search-wrap { position: relative; }
  .search-wrap input {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 12px 6px 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    width: 200px;
    outline: none;
    transition: border 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-3);
    font-size: 14px;
    pointer-events: none;
  }

  /* AUFGABE CARD */
  .aufgabe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 0.75rem;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .aufgabe-card:hover { border-color: var(--border-strong); }
  .aufgabe-card.open { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.25rem;
    cursor: pointer;
    user-select: none;
  }
  .card-number {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    min-width: 28px;
    padding-top: 2px;
  }
  .card-main { flex: 1; }
  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card-meta {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 400;
  }
  .tag-thema { background: var(--accent-bg); color: var(--accent-text); }
  .tag-datum { background: var(--surface2); color: var(--text-2); }
  .tag-punkte { background: var(--amber-bg); color: var(--amber); }
  .tag-status-offen { background: var(--red-bg); color: var(--red); }
  .tag-status-ok { background: var(--green-bg); color: var(--green); }

  .card-actions {
    display: flex; align-items: center; gap: 8px; padding-top: 2px;
  }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    color: var(--text-3); font-size: 14px;
    padding: 4px; border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-icon:hover { color: var(--text); background: var(--surface2); }
  .btn-del:hover { color: var(--red); background: var(--red-bg); }
  .chevron-icon {
    color: var(--text-3); font-size: 13px;
    transition: transform 0.2s;
    display: inline-block;
  }
  .chevron-icon.open { transform: rotate(90deg); }

  /* CARD BODY */
  .card-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 1.25rem;
    animation: fadeIn 0.15s ease;
  }
  .card-body.open { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .section-heading {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 0.5rem;
    margin-top: 1rem;
  }
  .section-heading:first-child { margin-top: 0; }

  .aufgabe-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-2);
    white-space: pre-wrap;
  }

  /* LÖSUNGSWEG BLOCK */
  .loesung-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-top: 0.5rem;
  }
  .loesung-block pre {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text);
    white-space: pre-wrap;
    line-height: 1.7;
  }

  /* TABELLE */
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 0.5rem;
  }
  .result-table th {
    text-align: left;
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .result-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table td.num {
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
  }
  .result-table td.highlight { color: var(--accent); font-weight: 500; }
  .result-table td.zero { color: var(--text-3); }

  /* ADD FORM */
  .add-panel {
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-top: 1.5rem;
  }
  .add-panel-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1.25rem; cursor: pointer; user-select: none;
  }
  .add-panel-header h2 {
    font-size: 15px; font-weight: 500; color: var(--text);
  }
  .add-panel-header .toggle-icon {
    font-size: 18px; color: var(--text-3); transition: transform 0.2s;
  }
  .add-panel-header.open .toggle-icon { transform: rotate(45deg); }
  .add-form { display: none; }
  .add-form.open { display: block; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-2);
    text-transform: uppercase;
  }
  .form-group input, .form-group select, .form-group textarea {
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
  }
  .form-group textarea { min-height: 90px; resize: vertical; line-height: 1.6; }

  .btn-submit {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: none;
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .btn-submit:hover { background: var(--accent); }
  .btn-reset {
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: none;
    color: var(--text-2);
    cursor: pointer;
    margin-top: 4px;
    margin-left: 8px;
  }
  .btn-reset:hover { background: var(--surface2); }

  /* STATUS TOGGLE */
  .status-toggle {
    display: flex; gap: 6px; align-items: center; margin-top: 0.75rem;
  }
  .status-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    color: var(--text-2);
    transition: all 0.12s;
  }
  .status-btn.active-ok { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .status-btn.active-offen { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-3);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* EXPORT */
  .export-bar {
    display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 8px;
  }
  .btn-export {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .btn-export:hover { background: var(--surface2); }

  @media print {
    header { background: #000 !important; }
    .add-panel, .toolbar, .export-bar { display: none !important; }
    .card-body { display: block !important; }
    .aufgabe-card { break-inside: avoid; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">BWL · Materialwirtschaft · Berufsschule</div>
  <h1><span>Unterrichts-</span>Aufgaben</h1>
  <div class="header-stats">
    <span class="stat">Aufgaben: <b id="stat-total">0</b></span>
    <span class="stat">Gelöst: <b id="stat-ok">0</b></span>
    <span class="stat">Offen: <b id="stat-offen">0</b></span>
    <span class="stat">Punkte gesamt: <b id="stat-punkte">0</b></span>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="filter-btn active" onclick="setFilter('alle', this)">Alle</button>
      <button class="filter-btn" onclick="setFilter('offen', this)">Offen</button>
      <button class="filter-btn" onclick="setFilter('gelöst', this)">Gelöst</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Suchen..." oninput="renderList()">
    </div>
  </div>

  <div class="export-bar">
    <button class="btn-export" onclick="exportJSON()">↓ Export JSON</button>
    <button class="btn-export" onclick="importJSON()">↑ Import JSON</button>
    <button class="btn-export" onclick="window.print()">🖨 Drucken</button>
  </div>

  <div id="aufgaben-liste"></div>

  <div class="add-panel">
    <div class="add-panel-header" onclick="toggleAddForm()">
      <span class="toggle-icon" id="add-toggle-icon">+</span>
      <h2>Neue Aufgabe hinzufügen</h2>
    </div>
    <div class="add-form" id="add-form">
      <div class="form-grid">
        <div class="form-group full">
          <label>Aufgabentitel *</label>
          <input type="text" id="inp-titel" placeholder="z.B. Aufgabe 7 – ABC-Analyse">
        </div>
        <div class="form-group">
          <label>Thema</label>
          <input type="text" id="inp-thema" placeholder="z.B. Materialplanung">
        </div>
        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="inp-datum">
        </div>
        <div class="form-group">
          <label>Punkte</label>
          <input type="number" id="inp-punkte" placeholder="z.B. 10" min="0">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="inp-status">
            <option value="offen">Offen</option>
            <option value="gelöst">Gelöst</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Aufgabentext / Beschreibung</label>
          <textarea id="inp-beschreibung" placeholder="Aufgabenstellung, Kontext, gegebene Werte..."></textarea>
        </div>
        <div class="form-group full">
          <label>Lösungsweg</label>
          <textarea id="inp-loesung" placeholder="Schritt-für-Schritt Lösungsweg..." style="min-height:120px;"></textarea>
        </div>
        <div class="form-group full">
          <label>Ergebnis / Tabelle (optional)</label>
          <textarea id="inp-ergebnis" placeholder="Endergebnisse, Tabellenwerte, Fazit..."></textarea>
        </div>
      </div>
      <div>
        <button class="btn-submit" onclick="saveAufgabe()">Aufgabe speichern</button>
        <button class="btn-reset" onclick="clearForm()">Leeren</button>
      </div>
    </div>
  </div>
</main>

<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const KEY = 'aufgaben_v2';
let activeFilter = 'alle';
let editId = null;

const VORGABE = [
  {
    id: 'a2',
    titel: 'Aufgabe 6 – Stückliste / Bedarfsanalyse Elektromotor E10',
    thema: 'Materialplanung',
    datum: '2026-04-23',
    punkte: 10,
    status: 'gelöst',
    beschreibung: `Gießereigruppe Alles GmbH verwendet Baukastenstücklisten für Fleischereimaschinen.

Stückliste Elektromotor E10:
  BG 101 – Gehäuse (Menge: 1)
    → Teil 1010 – Gehäusedeckel (Menge: 2)
    → Sechskantschraube M4×200, verchromt (Menge: 4)
  BG 102 – Welle komplett (Menge: 1)
  BG 103 – Festkupplung (Menge: 1)
    → Teil 1030 – Fußplatte 30×40 cm (Menge: 1)
    → Sechskantschraube M4×200, verchromt (Menge: 2)

Kundenauftrag: 200 Stück Fleischs. F5
Folgeauftrag:   50 Stück F5
→ Primärbedarf gesamt: 250 Stück

Lagerbestände:
  BG 102 – Welle komplett:          25 Stk
  T-1010 – Gehäusedeckel:          200 Stk
  T-1030 – Fußplatte 30×40 cm:     250 Stk
  Sechskantschraube M4×200:      1.580 Stk`,
    loesung: `Schritt 1: Sekundärbedarfe aus der Stückliste ableiten
  E10 (Elektromotor):     1 × 250 (von F5)       = 250
  BG 101 (Gehäuse):       1 × 250 (von E10)      = 250
  BG 102 (Welle):         1 × 250 (von E10)      = 250
  BG 103 (Festkupplung):  1 × 250 (von E10)      = 250
  T-1010 (Gehäusedeckel): 2 × 250 (von BG 101)   = 500
  T-1030 (Fußplatte):     1 × 250 (von BG 103)   = 250
  Schraube M4×200:        4×250 (BG101) + 2×250 (BG103) = 1.000 + 500 = 1.500

Schritt 2: Bruttobedarf = Sekundärbedarf (kein zusätzlicher Primärbedarf außer F5)

Schritt 3: Nettobedarf = Bruttobedarf − Lagerbestand (mind. 0)
  T-1030: 250 − 250 = 0 (Lager deckt Bedarf exakt)
  Schraube: 1.500 − 1.580 = negativ → NB = 0 (Überbestand)`,
    ergebnis: `Teil                      | Primärb. | Sekundärb. | Bruttob. | Lagerb. | Nettob.
F5 – Fleischschweidemasch. |    250   |     –      |    250   |    0    |   250
E10 – Elektromotor         |     –    |    250     |    250   |    0    |   250
BG 101 – Gehäuse           |     –    |    250     |    250   |    0    |   250
BG 102 – Welle komplett    |     –    |    250     |    250   |   25    |   225
BG 103 – Festkupplung      |     –    |    250     |    250   |    0    |   250
T-1010 – Gehäusedeckel     |     –    |    500     |    500   |  200    |   300
T-1030 – Fußplatte         |     –    |    250     |    250   |  250    |     0
Schraube M4×200            |     –    |  1.500     |  1.500   | 1.580   |     0`
  },
  {
    id: 'a1',
    titel: 'Aufgabe 6 – Gozintograph / Bedarfsanalyse',
    thema: 'Materialplanung',
    datum: '2026-04-23',
    punkte: 10,
    status: 'gelöst',
    beschreibung: `Einem Mitarbeiter der Materialdisposition der Ventisys Kältetechnik GmbH liegt für einen Schaltschrank EX 734 folgender Gozintograph vor.

Primärbedarf EX 734: 500 Stück

Struktur (Elternteil × Menge → Kind):
  Teil 1 ×1 → Teil 2
  Teil 1 ×2 → Teil 3
  Teil 2 ×4 → Teil 4
  Teil 2 ×2 → Teil 5
  Teil 2 ×2 → Teil 6
  Teil 3 ×2 → Teil 7
  Teil 3 ×8 → Teil 8

Lagerbestände:
  Teil 4: 750 Stk  |  Teil 5: 1.300 Stk
  Teil 6: 800 Stk  |  Teil 7: 400 Stk  |  Teil 8: 1.700 Stk`,
    loesung: `Schritt 1: Sekundärbedarfe aus dem Gozintographen ableiten
  Teil 2: 1 × 500 (von Teil 1) = 500
  Teil 3: 2 × 500 (von Teil 1) = 1.000
  Teil 4: 4 × 500 (von Teil 2) = 2.000
  Teil 5: 2 × 500 (von Teil 2) = 1.000
  Teil 6: 2 × 500 (von Teil 2) = 1.000
  Teil 7: 2 × 1.000 (von Teil 3) = 2.000
  Teil 8: 8 × 1.000 (von Teil 3) = 8.000

Schritt 2: Bruttobedarf = Primärbedarf + Sekundärbedarf
  (Teile 1–3 haben keinen separaten Lagerbestand)

Schritt 3: Nettobedarf = Bruttobedarf − Lagerbestand (mind. 0)
  Teil 5: 1.000 − 1.300 = negativ → NB = 0 (Überbestand)`,
    ergebnis: `lfd. | Primärbedarf | Sekundärbedarf | Bruttobedarf | Lagerbestand | Nettobedarf
  1  |     500      |       –        |     500      |      0       |    500
  2  |      –       |      500       |     500      |      0       |    500
  3  |      –       |    1.000       |   1.000      |      0       |  1.000
  4  |      –       |    2.000       |   2.000      |    750       |  1.250
  5  |      –       |    1.000       |   1.000      |  1.300       |      0
  6  |      –       |    1.000       |   1.000      |    800       |    200
  7  |      –       |    2.000       |   2.000      |    400       |  1.600
  8  |      –       |    8.000       |   8.000      |  1.700       |  6.300`
  }
];

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY));
    return Array.isArray(d) ? d : null;
  } catch { return null; }
}

function save(data) {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch {}
}

let aufgaben = load() || VORGABE;

function uid() { return 'a' + Date.now() + Math.random().toString(36).slice(2, 6); }

function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d + 'T00:00:00').toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
  catch { return d; }
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const el = document.getElementById('aufgaben-liste');
  let list = aufgaben.filter(a => {
    if (activeFilter === 'offen' && a.status !== 'offen') return false;
    if (activeFilter === 'gelöst' && a.status !== 'gelöst') return false;
    if (q) {
      const hay = (a.titel + a.thema + a.beschreibung + a.loesung + a.ergebnis).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  updateStats();

  if (!list.length) {
    el.innerHTML = '<div class="empty-state">Keine Aufgaben gefunden.</div>';
    return;
  }

  el.innerHTML = list.map((a, i) => {
    const idx = aufgaben.indexOf(a);
    const statusTag = a.status === 'gelöst'
      ? `<span class="tag tag-status-ok">gelöst</span>`
      : `<span class="tag tag-status-offen">offen</span>`;
    return `
    <div class="aufgabe-card" id="card-${a.id}">
      <div class="card-header" onclick="toggle('${a.id}')">
        <div class="card-number">#${String(aufgaben.length - idx).padStart(2,'0')}</div>
        <div class="card-main">
          <div class="card-title">${esc(a.titel)}</div>
          <div class="card-meta">
            ${a.thema ? `<span class="tag tag-thema">${esc(a.thema)}</span>` : ''}
            ${a.datum ? `<span class="tag tag-datum">${fmtDate(a.datum)}</span>` : ''}
            ${a.punkte ? `<span class="tag tag-punkte">${esc(String(a.punkte))} Pkt.</span>` : ''}
            ${statusTag}
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-icon" onclick="toggleStatus(event,'${a.id}')" title="Status wechseln">⟳</button>
          <button class="btn-icon" onclick="startEdit(event,'${a.id}')" title="Bearbeiten">✎</button>
          <button class="btn-icon btn-del" onclick="delAufgabe(event,'${a.id}')" title="Löschen">✕</button>
          <span class="chevron-icon" id="chev-${a.id}">›</span>
        </div>
      </div>
      <div class="card-body" id="body-${a.id}">
        ${a.beschreibung ? `<div class="section-heading">Aufgabe</div><div class="aufgabe-text">${esc(a.beschreibung)}</div>` : ''}
        ${a.loesung ? `<div class="section-heading" style="margin-top:1rem;">Lösungsweg</div>
          <div class="loesung-block"><pre>${esc(a.loesung)}</pre></div>` : ''}
        ${a.ergebnis ? `<div class="section-heading" style="margin-top:1rem;">Ergebnis</div>
          <div class="loesung-block"><pre>${esc(a.ergebnis)}</pre></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const card = document.getElementById('card-' + id);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
  card.classList.toggle('open', open);
}

function toggleStatus(e, id) {
  e.stopPropagation();
  const a = aufgaben.find(x => x.id === id);
  if (!a) return;
  a.status = a.status === 'gelöst' ? 'offen' : 'gelöst';
  save(aufgaben);
  renderList();
}

function delAufgabe(e, id) {
  e.stopPropagation();
  if (!confirm('Aufgabe wirklich löschen?')) return;
  aufgaben = aufgaben.filter(x => x.id !== id);
  save(aufgaben);
  renderList();
}

function startEdit(e, id) {
  e.stopPropagation();
  const a = aufgaben.find(x => x.id === id);
  if (!a) return;
  editId = id;
  document.getElementById('inp-titel').value = a.titel || '';
  document.getElementById('inp-thema').value = a.thema || '';
  document.getElementById('inp-datum').value = a.datum || '';
  document.getElementById('inp-punkte').value = a.punkte || '';
  document.getElementById('inp-status').value = a.status || 'offen';
  document.getElementById('inp-beschreibung').value = a.beschreibung || '';
  document.getElementById('inp-loesung').value = a.loesung || '';
  document.getElementById('inp-ergebnis').value = a.ergebnis || '';
  openAddForm();
  document.querySelector('.add-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function saveAufgabe() {
  const titel = document.getElementById('inp-titel').value.trim();
  if (!titel) { alert('Bitte einen Titel eingeben.'); return; }
  const obj = {
    id: editId || uid(),
    titel,
    thema: document.getElementById('inp-thema').value.trim(),
    datum: document.getElementById('inp-datum').value,
    punkte: parseInt(document.getElementById('inp-punkte').value) || 0,
    status: document.getElementById('inp-status').value,
    beschreibung: document.getElementById('inp-beschreibung').value.trim(),
    loesung: document.getElementById('inp-loesung').value.trim(),
    ergebnis: document.getElementById('inp-ergebnis').value.trim()
  };
  if (editId) {
    const idx = aufgaben.findIndex(x => x.id === editId);
    if (idx !== -1) aufgaben[idx] = obj;
    editId = null;
  } else {
    aufgaben.unshift(obj);
  }
  save(aufgaben);
  clearForm();
  closeAddForm();
  renderList();
}

function clearForm() {
  editId = null;
  ['titel','thema','datum','punkte','beschreibung','loesung','ergebnis'].forEach(f => {
    const el = document.getElementById('inp-' + f);
    if (el) el.value = '';
  });
  document.getElementById('inp-status').value = 'offen';
}

function openAddForm() {
  document.getElementById('add-form').classList.add('open');
  document.querySelector('.add-panel-header').classList.add('open');
}
function closeAddForm() {
  document.getElementById('add-form').classList.remove('open');
  document.querySelector('.add-panel-header').classList.remove('open');
}
function toggleAddForm() {
  const form = document.getElementById('add-form');
  if (form.classList.contains('open')) closeAddForm();
  else openAddForm();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function updateStats() {
  document.getElementById('stat-total').textContent = aufgaben.length;
  document.getElementById('stat-ok').textContent = aufgaben.filter(a => a.status === 'gelöst').length;
  document.getElementById('stat-offen').textContent = aufgaben.filter(a => a.status === 'offen').length;
  document.getElementById('stat-punkte').textContent = aufgaben.reduce((s, a) => s + (a.punkte || 0), 0);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(aufgaben, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'aufgaben.json'; a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) { alert('Ungültiges Format.'); return; }
      if (!confirm(`${data.length} Aufgaben importieren? Bestehende Daten werden ersetzt.`)) return;
      aufgaben = data;
      save(aufgaben);
      renderList();
    } catch { alert('Fehler beim Lesen der Datei.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

renderList();
</script>
</body>
</html>
